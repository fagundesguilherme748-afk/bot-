<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Bet365 Tipster Bot</title>
    <style>
        body {
            width: 250px;
            padding: 15px;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #fff;
        }

        h3 {
            margin-top: 0;
            font-size: 16px;
            color: #0ea5e9;
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        label {
            font-size: 12px;
            color: #aaa;
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        input[type="password"],
        select,
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            background-color: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
        }

        .switch-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 15px;
        }

        .btn-save {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background-color: #10b981;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-save:hover {
            background-color: #059669;
        }

        #statusMsg {
            margin-top: 10px;
            font-size: 11px;
            text-align: center;
            color: #10b981;
            display: none;
        }
    </style>
</head>

<body>
    <h3>🔥 Telegram Bet Bot 🔥</h3>

    <div class="switch-group">
        <span style="font-size: 13px; font-weight: bold;">Bot Ativado?</span>
        <input type="checkbox" id="botAtivo" style="transform: scale(1.3);">
    </div>

    <label for="senha">Senha do Painel</label>
    <input type="password" id="senha" placeholder="A senha lá do kabum...">

    <label for="grupoDestino">Destino</label>
    <select id="grupoDestino">
        <option value="vip">Somente VIP</option>
        <option value="free">Somente FREE</option>
    </select>

    <label for="tipsterName">Seu Nome (Tipster)</label>
    <input type="text" id="tipsterName" placeholder="Ex: Guilherme">

    <button class="btn-save" id="btnSalvar">Salvar Configurações</button>
    <div id="statusMsg">Salvo com sucesso!</div>

    <script src="popup.js"></script>
</body>

</html>
